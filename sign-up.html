<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduRocks Sign Up</title>
    <link rel="stylesheet" href="./styles/form.css" />
    <link rel="shortcut icon" href="./images/logo.png" type="image/x-icon" />
  </head>
  <body>
    <main>
      <form action="#" method="post" autocomplete="on">
        <h1>
          EduRocks <br />
          Sign up
        </h1>
        <div class="form-group">
          <label for="fname">First Name</label><br />
          <input
            type="text"
            name="fname"
            id="fname"
            placeholder="Your Firstname"
            autofocus
            required
            aria-required="true"
          />
          <span class="error"></span>
        </div>
        <div class="form-group">
          <label for="lname">Last Name <small>(Optional)</small></label
          ><br />
          <input
            type="text"
            name="lname"
            id="lname"
            placeholder="Your Lastname"
          />
          <span class="error"></span>
        </div>
        <div class="form-group">
          <label for="password">Password</label><br />
          <input
            type="text"
            name="password"
            id="password"
            placeholder="Your Password"
            required
            aria-required="true"
          />
          <span class="error"></span>
        </div>
        <div class="form-group">
          <label for="confirmpassword">Confirm Password</label><br />
          <input
            type="text"
            name="confirmpassword"
            id="confirmpassword"
            placeholder="Confirm Your Password"
            required
            aria-required="true"
          />
          <span class="error"></span>
        </div>
        <div class="check">
          <input
            type="checkbox"
            name="consent"
            id="consent"
            required
            aria-required="true"
          />
          <label for="consent"
            ><small
              >I have read the <a href="#">privacy policy</a></small
            ></label
          >
        </div>
        <div class="alt">
          <button type="submit">Create Account</button>
        </div>
        <div>
          <small
            >Already have an account? <a href="./log-in.html">Sign In</a></small
          >
        </div>
      </form>
    </main>
  </body>
</html>
