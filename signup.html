<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduRocks-Sign Up</title>
    <link rel="stylesheet" href="styles/form.css" />
  </head>
  <body>
    <h1>
        Welcome to EduRocks,<br />
        Sign up
      </h1>
    <form action="#" method="get">
      <div class="input-field">
        <div>
          <label for="fname">First Name</label><br />
          <input
            type="text"
            name="fname"
            id="fname"
            placeholder="Your Firstname"
          />
        </div>
        <div>
          <label for="lname">Last Name <small>(Optional)</small></label
          ><br />
          <input
            type="text"
            name="lname"
            id="lname"
            placeholder="Your Lastname"
          />
        </div>
        <div>
          <label for="password">Password</label><br />
          <input
            type="text"
            name="password"
            id="password"
            placeholder="Your Password"
          />
        </div>
        <div>
          <label for="confirmpassword">Password</label><br />
          <input
            type="text"
            name="confirmpassword"
            id="confirmpassword"
            placeholder="Confirm Your Password"
          />
        </div>
        <div class="check">
          <input type="checkbox" name="consent" id="consent" />
          <label for="consent"
            >I have read the <a href="#">privacy policy</a></label
          >
        </div>
      </div>
      <div class="submit-field">
        <div>
          <input type="submit" value="CREATE ACCOUNT" />
        </div>
        <small>Already have an account? <a href="login.html">Sign In</a></small>
      </div>
    </form>
  </body>
</html>
