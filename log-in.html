<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduRocks Login Page</title>
    <link rel="stylesheet" href="./styles/form.css" />
  </head>
  <body class="login">
    <main class="login">
      <form action="#" method="get" autocomplete="on">
        <h1>
          EduRocks <br />
          Login
        </h1>
        <div class="form-group">
          <label for="name">Username </label> <br />
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Your Username"
            required
            autofocus
            aria-required="true"
          />
        </div>

        <div class="form-group">
          <label for="email">Email </label> <br />
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Your Email"
            required
            aria-required="true"
          />
        </div>
        <div class="alt"><button type="submit">Login</button><br /></div>
        <div>
          <small
            >Don't have an account? <a href="./sign-up.html">Sign Up</a></small
          >
        </div>
      </form>
    </main>
  </body>
</html>
